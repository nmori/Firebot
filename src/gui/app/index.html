        <script type="text/javascript" src="./directives/sidebar/navLink.js"></script>
        <script type="text/javascript" src="./directives/sidebar/sidebar.js"></script>
        <!-- /include -->
    </head>
    <body ng-cloak>
        <toast></toast>

        <div class="loader-wrapper" ng-if="showSpinner">
            <div class="loader">{{'MAIN.LOADING' | translate }}</div>
        </div>

        <div class="appwrapper">
            <sidebar class="noselect"></sidebar>

            <div class="fb-tab-content">
                <div class="tab-header">
                    <span class="noselect" style="flex: 1" role="heading" aria-level="1">{{sbm.currentTabName}}</span>
                <div style="flex: 1">
                    <stream-info />
                </div>
                <div
                    style="
                        flex: 1;
                        display: flex;
                        align-items: center;
                        justify-content: center;
                    "
                >
                    <update-indicator style="margin-left: auto"></update-indicator>
                    <notification-center></notification-center>
                    <div
                    class="logins-wrapper noselect"
                    uib-dropdown
                    uib-dropdown-toggle
                    aria-label="ログインとプロフィール管理"
                    >
                        <img
                            class="login-thumbnail noselect"
                            ng-src="{{cs.getAccountAvatar('streamer')}}"
                        />
                        <img
                            class="login-thumbnail noselect"
                            ng-src="{{cs.getAccountAvatar('bot')}}"
                        />
                        <div class="fb-arrow down login-arrow"></div>
                        <ul
                            class="dropdown-menu right-justified-dropdown"
                            uib-dropdown-menu
                        >
                            <li>
                                <a
                                    href
                                    ng-click="showManageLoginsModal()"
                                    aria-label="ログインを管理"
                                >
                                    <span>
                                        <i class="fal fa-sign-in-alt"></i>
                                    </span>
                                    ログインを管理
                                </a>
                            </li>
                            <li class="divider"></li>
                            <li class="dropdown-header">プロファイル</li>
                            <li
                                ng-repeat="profile in cs.profiles"
                                ng-class="{'noclick': currentProfileId == profile.profileId}"
                                uib-tooltip="現在のプロファイル"
                                tooltip-enable="currentProfileId == profile.profileId"
                                tooltip-append-to-body="true"
                            >
                                <a
                                    href
                                    ng-click="switchProfiles(profile.profileId)"
                                    ng-class="{'menunoclick': currentProfileId == profile.profileId}"
                                    aria-label="{{currentProfileId == profile.profileId ? '現在のプロファイル ('+ profile.profileId +')' : profile.profileId + ' プロファイルに切り替え'}}"
                                >
                                    <span class="accounts-image"><img ng-src="{{profile.avatar}}"/></span>
                                    <span class="accounts-info" style="text-transform: unset">{{profile.profileId}}</span>
                                </a>
                            </li>
                            <li class="divider"></li>
                            <li>
                                <a href ng-click="showNewProfileModal()">
                                    <span>
                                        <i class="fal fa-user-plus"></i>
                                    </span>
                                    新しいプロファイルを追加
                                </a>
                            </li>
                            <li>
                                <a href ng-click="showRenameProfileModal()">
                                    <span>
                                        <i class="fal fa-pencil"></i>
                                    </span>
                                    このプロファイル名を変更
                                </a>
                            </li>
                            <li>
                                <a href ng-click="showDeleteProfileModal()">
                                    <span>
                                        <i class="fal fa-user-minus"></i>
                                    </span>
                                    このプロファイルを削除
                                </a>
                            </li>
                        </ul>
                    </div>
                </div>
                </div>
                <div
                class="tab-body-wrapper"
                ng-class="{ 'no-scroll': sbm.disableScroll }"
                >
                <div
                    class="tab-body"
                    ng-class="{ 'fullpage-tab': sbm.fullPage }"
                    role="main"
                >
                    <!-- angular templating -->
                    <!-- this is where tab content will be injected -->
                    <div ng-view style="width: 100%"></div>
                </div>
                </div>
            </div>
        </div>

        <!-- New Profile Modal -->
        <script type="text/ng-template" id="newProfileModal.html">
            <div class="modal-header">
                <button type="button" class="close" aria-label="閉じる" ng-click="dismiss()"><span aria-hidden="true">&times;</span></button>
                <h4 class="modal-title" id="errorLabel">新しいプロファイルを作成</h4>
            </div>
            <div class="modal-body">
                <div class="input-group">
                    <span class="input-group-addon">プロファイル名</span>
                    <input type="text" class="form-control" ng-model="profileName" placeholder="ここに入力">
                </div>

                <div class="alert alert-warning" style="margin-top:15px;">
                    注: 新しいプロファイルの作成にはアプリの再起動が必要です。
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-link" ng-click="dismiss()">キャンセル</button>
                <button type="button" class="btn btn-primary" ng-click="createNewProfile()">作成してアプリを再起動</button>
            </div>
        </script>

        <!-- Rename Profile Modal -->
        <script type="text/ng-template" id="renameProfileModal.html">
            <div class="modal-header">
                <button type="button" class="close" aria-label="閉じる" ng-click="dismiss()"><span aria-hidden="true">&times;</span></button>
                <h4 class="modal-title">プロファイル名を変更</h4>
            </div>
            <div class="modal-body">
                <div class="input-group">
                    <span class="input-group-addon">プロファイル名</span>
                    <input type="text" class="form-control" ng-model="profileName" placeholder="ここに入力">
                </div>

                <div class="alert alert-warning"  style="margin-top:15px;">
                        注: プロファイル名の変更にはアプリの再起動が必要です。
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-link" ng-click="dismiss()">キャンセル</button>
                <button type="button" class="btn btn-primary" ng-click="renameProfile()">変更してアプリを再起動</button>
            </div>
        </script>

        <!-- Delete Profile Modal -->
        <script type="text/ng-template" id="deleteProfileModal.html">
            <div class="modal-header">
                <button type="button" class="close" aria-label="閉じる" ng-click="dismiss()"><span aria-hidden="true">&times;</span></button>
                <h4 class="modal-title">プロファイルを削除</h4>
            </div>
            <div class="modal-body">
                警告: このプロファイルと関連設定をすべて削除しようとしています。本当に実行しますか？
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-danger" ng-click="deleteProfile()">削除してアプリを再起動</button>
                <button type="button" class="btn btn-link" ng-click="dismiss()">キャンセル</button>
            </div>
        </script>

        <!-- Error Modal -->
        <script type="text/ng-template" id="errorModal.html">
            <div class="modal-header">
                <button type="button" class="close" aria-label="閉じる" ng-click="dismiss()"><span aria-hidden="true">&times;</span></button>
                <h4 class="modal-title" id="errorLabel">エラー</h4>
            </div>
            <div class="modal-body">
                <div style="display: flex;">
                    <div class="modal-icon"><i class="fad fa-times-circle" aria-hidden="true"></i></div>
                    <div>{{message}}</div>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-default" ng-click="close()">閉じる</button>
            </div>
        </script>

        <!-- Info Modal -->
        <script type="text/ng-template" id="infoModal.html">
            <div class="modal-header">
                <button type="button" class="close" aria-label="閉じる" ng-click="dismiss()"><span aria-hidden="true">&times;</span></button>
                <h4 class="modal-title" id="errorLabel">情報</h4>
            </div>
            <div class="modal-body">
                <div style="display: flex;">
                    <div class="modal-icon"><i class="fad fa-info-circle" aria-hidden="true"></i></div>
                    <div>{{message}}</div>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-default" ng-click="close()">閉じる</button>
            </div>
        </script>

        <!-- overlay info modal -->
        <script type="text/ng-template" id="overlayInfoModal.html">
            
        </script>

        <!-- show events modal -->
        <script type="text/ng-template" id="overlayEventsModal.html">
            <div class="modal-header" style="text-align:center;">
                <h2 class="modal-title">イベント一覧設定</h2>
            </div>
            <div class="modal-body">
                <h3>イベント一覧</h3>
                <show-events-settings model="textSettings"></show-events-settings>

                <h3>テキストプリセット</h3>
                <event-list-text-options model="textSettings" is-global="true"></event-list-text-options>
            </div>
            <div class="modal-footer" style="text-align:center;">
                <button class="btn btn-link" ng-click="dismiss()">キャンセル</button>
                <button class="btn btn-primary" ng-click="save()">保存</button>
            </div>
        </script>

        <!-- Just updated modal -->
        <script type="text/ng-template" id="updatedModal.html">
            <div class="modal-header">
                <h4 class="modal-title"></h4>
            </div>
            <div class="modal-body" style="text-align:center;">
                <div>
                    <span><i class="fal fa-check-circle animated bounceIn" style="font-size: 193px;color: green;"></i></span>
                </div>
                <h1 style="animation-delay: 0.3s;" class="animated fadeIn">アップデートに成功しました！</h1>
                <h3 style="color:darkgray; animation-delay: 0.3s;" class="animated fadeIn">{{appVersion}} をインストール済み</h3>
                <br />
                <p style="animation-delay: 0.3s;" class="animated fadeIn">
                    新機能は <strong>ヘルプ</strong> &gt; <strong>リリースノート</strong> で確認できます。
                </p>
            </div>
            <div class="modal-footer" style="text-align:center;">
                <button style="animation-delay: 0.3s;" class="btn btn-primary animated fadeIn" ng-click="dismiss()">OK</button>
            </div>
        </script>

        <!-- Download Modal -->
        <script type="text/ng-template" id="downloadModal.html">
            <div class="modal-header">
                <h2 ng-if="!installing">{{downloadComplete ? 'ダウンロード完了！' : 'アップデートをダウンロード中...'}}</h2>
                <h2 ng-if="installing">アップデートをインストール中...</h2>
            </div>
            <div class="modal-body" style="text-align:center;">
                <div ng-if="(!downloadComplete && !downloadHasError) || installing" style="overflow: hidden;">
                    <div class="loader">読み込み中...</div>
                </div>
                <p ng-if="downloadComplete && !installing" style="color:darkgray;">Firebot のアップデートをダウンロードしました。今すぐインストールしますか？それとも終了時に実行しますか？</p>
                <p ng-if="downloadHasError" style="color:red;">
                    {{errorMessage}}
                </p>
            </div>
            <div class="modal-footer">
                <button ng-if="downloadHasError" class="btn btn-primary" ng-click="dismiss()">閉じる</button>
                <button ng-if="!downloadHasError && downloadComplete && !installing" class="btn btn-primary" ng-click="installUpdate()">今すぐインストール</button>
                <button ng-if="!downloadHasError && downloadComplete && !installing" class="btn btn-default" ng-click="dismiss()">終了時にインストール</button>
            </div>
        </script>

        <!-- Edit Effect Modal -->
        <script type="text/ng-template" id="editEffectModal.html">
            <scroll-sentinel element-class="edit-effect-header"></scroll-sentinel>
                <div class="modal-header sticky-header flex flex-col items-start no-before no-after">
                    <div class="flex items-center justify-between" style="width: 100%;">
                        <h4 class="modal-title">{{isAddMode ? "新しいエフェクトを追加" : "エフェクトを編集"}}</h4>
                        <div class="flex item-center justify-between">
                            <div
                                class="test-effects-btn clickable"
                                uib-tooltip="エフェクトをテスト" 
                                ng-hide="effect == null || effect.type === 'Nothing'" 
                                ng-click="runEffect()" 
                                aria-label="エフェクトをテスト" 
                                role="button"
                            >
                                <i class="far fa-play-circle"></i>
                            </div> 
                            <div>
                                <a href role="button"
                                    aria-label="エフェクトメニューを開く"
                                    class="effects-actions-btn"
                                    uib-tooltip="エフェクトメニューを開く"
                                    uib-dropdown-menu
                                    context-menu="getOverflowMenu()"
                                    context-menu-on="click"
                                    context-menu-class="effect-overflow-menu"
                                    tooltip-append-to-body="true"
                                    style="font-size: 31px"
                                >
                                    <i class="fal fa-ellipsis-v"></i>
                                </a>
                            </div>
                        </div>
                    </div>

                    <ol class="breadcrumb mb-0 pb-4 pl-0 self-start" style="background-color:transparent;">
                        <li ng-repeat="modal in openModals"><a href ng-click="closeToModal(modal.id)">{{modal.name}}</a></li>
                        <li class="active">{{effectDefinition.definition.name}}</li>
                    </ol>
                </div>

                <div class="modal-body">
                    <div style="padding-left: 15px;margin-bottom: 20px;margin-top: 10px;">
                        <div class="muted" style="font-size:12.5px;">現在のエフェクト:</div>
                        <div style="display:flex;align-items: center;">
                        <div style="font-size: 20px;font-weight: 100;">{{effectDefinition.definition.name}}</div>
                        <button type="button" ng-click="openNewEffectModal()" class="btn btn-sm btn-default ml-4" style="font-size: 10px;">変更</button>
                        </div>
                    </div>
                
                    <div class="effect-settings-panel">
                        <div ng-show="effect.type == 'Nothing'" class="effect-specific-title"><h4>エフェクトを選択してください。</h4></div>
                        <effect-options effect="effect" type="effect.type" trigger="{{triggerType}}" ng-show="effect.type != null" trigger-meta="triggerMeta"><effect-options>
                    </div>
                </div>
                <div class="modal-footer sticky-footer edit-effect-footer">
                    <button
                        ng-if="effectDefinition.definition.outputs != null && effectDefinition.definition.outputs.length > 0"
                        class="btn btn-link pull-left"
                        ng-click="openOutputsModal()"
                    >
                        <i class="fas fa-sign-out"></i>
                        <span>出力</span>
                    </button>

                    <button class="btn btn-link" ng-click="dismiss()">キャンセル</button>

                    <button ng-if="openModals.length < 2" type="button" class="btn btn-primary" ng-click="save()" ng-disabled="effect.type === 'Nothing'">{{isAddMode ? "追加" : "保存"}}</button>
                    <div ng-if="openModals.length >= 2" class="btn-group dropup" uib-dropdown>
                        <button id="split-button" type="button" class="btn btn-primary" ng-click="save()" ng-disabled="effect.type === 'Nothing'">{{isAddMode ? "追加" : "保存"}}</button>
                        <button type="button" class="btn btn-primary" uib-dropdown-toggle aria-label="メニューを開く">
                            <span class="caret" style="border-top: 4px dashed !important; border-bottom: none !important;"></span>
                        </button>
                        <ul class="dropdown-menu dropdown-menu-right" style="min-width: 100%" uib-dropdown-menu role="menu" aria-labelledby="split-button">
                            <li role="menuitem" ng-click="saveAll()"><a href>すべて保存 <tooltip text="'最後のウィンドウ（'+ openModals[0].name +'）まで、すべて保存します。'"></tooltip></a></li>
                        </ul>
                    </div>
                </div>
            <scroll-sentinel element-class="edit-effect-footer"></scroll-sentinel>
        </script>
    </body>
</html>
