<firebot-item-table
    items="hotkeyService.hotkeys"
    on-items-update="onHotkeysUpdated(items)"
    headers="headers"
    sort-tag-context="hotkeys"
    orderable="true"
    add-new-button-text="新しいホットキー"
    on-add-new-clicked="hotkeyService.showAddEditHotkeyModal()"
    context-menu-options="hotkeyOptions(item)"
    no-data-message="保存されたホットキーがありません。作成してみましょう！"
    none-found-message="ホットキーが見つかりません。"
    search-placeholder="ホットキーを検索"
    status-field="active"
></firebot-item-table>
