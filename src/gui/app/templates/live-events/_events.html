<!-- Events Tab View-->
<div style="min-width: 500px; height: 100%">
  <div style="height: 100%; display: flex; flex-direction: column">
    <div id="testDivFb" class="flex-row" style="height: 100%">
      <div class="editor-column pt-6" style="flex-shrink: 0">
        <div
          class="flex-row-center jspacebetween scene-row"
          style="flex-shrink: 0"
          ng-class="{'selected': es.tabIsSelected('mainevents')}"
          ng-click="es.setSelectedTab('mainevents')"
        >
          <div class="flex-row-center" style="height: 100%">
            <div>
              基本的なイベント
              <tooltip
                text="'どのイベントセットがアクティブであるかにかかわらず、常にアクティブであるイベントリスト'"
              ></tooltip>
            </div>
          </div>
          <div class="flex-row-center jspacebetween">
            <span
              class="status-dot active"
              uib-tooltip="メインイベントは常にアクティブ状態となります"
              tooltip-append-to-body="true"
            ></span>
            <div
              uib-dropdown
              uib-dropdown-toggle
              dropdown-append-to-body="true"
              class="clickable"
              ng-click="$event.stopPropagation()"
              style="
                font-size: 21px;
                height: 20px;
                width: 36px;
                text-align: center;
                display: flex;
                align-items: center;
                justify-content: center;
              "
            >
              <span class="noselect pointer"
                ><i class="fal fa-ellipsis-v"></i
              ></span>
              <ul class="dropdown-menu" uib-dropdown-menu>
                <li ng-click="copyEvents('mainevents')">
                  <a href><span class="iconify mr-4" data-icon="mdi:content-copy"></span> コピー</a>
                </li>
                <li
                  ng-class="{'disabled': !hasCopiedEvents()}"
                  ng-click="pasteEvents('mainevents')"
                  ng-disabled="!hasCopiedEvents()"
                >
                  <a href><span class="iconify mr-4" data-icon="mdi:content-paste"></span> 貼り付け</a>
                </li>
              </ul>
            </div>
          </div>
        </div>

        <div
          class="mt-6 mb-4 mx-0"
          style="height: 2px; background: #3e3f40; flex-shrink: 0"
        ></div>

        <div
          class="modal-subheader flex-row-center jspacebetween"
          style="flex-shrink: 0"
        >
          <span
            >イベントセット
            <tooltip
              text="'イベントセットを使うと、ゲーム別や季節テーマ別など複数のイベント構成を作成し、必要なものだけ有効化できます。'"
            ></tooltip
          ></span>
          <div class="clickable" ng-click="showCreateEventGroupModal()" aria-label="新規イベントセット">
            <i class="fas fa-plus-circle"></i>
          </div>
        </div>

        <div
          style="height: 100%; overflow-y: auto"
          ui-sortable="sortableOptions"
          ng-model="eventSets"
        >
          <div
            class="muted ml-7"
            ng-if="es.getEventGroups().length < 1"
            style="font-size: 12px"
          >
            イベントセットはありません
          </div>

          <div
            ng-repeat="group in es.getEventGroups() | orderBy: sortEventSets track by group.id"
            class="flex-row-center jspacebetween scene-row"
            ng-class="{'selected': es.tabIsSelected(group.id)}"
            ng-click="es.setSelectedTab(group.id)"
          >
            <div class="flex-row-center" style="height: 100%">
              <div class="row-text" style="max-width: 145px">
                {{group.name}}
              </div>
            </div>
            <div class="flex-row-center jspacebetween">
              <span aria-label="現在有効"
                ng-if="group.active"
                class="status-dot active"
                uib-tooltip="このイベントセットは有効です"
                tooltip-append-to-body="true"
              ></span>
              <span class="event-set-drag-handle dragHandle">
                <i class="fas fa-bars"></i>
              </span>
              <button aria-label="イベントセットオプション"
                class="noselect clickable text-3xl mx-3"
                style="background: transparent; border: none"
                context-menu="eventSetMenuOptions(group)"
                context-menu-class="angular-context-menu"
                context-menu-on="click"
                context-menu-orientation="left"
              >
                <i class="fal fa-ellipsis-v"></i>
              </button>
            </div>
          </div>
        </div>
      </div>

      <firebot-item-table
        items="getSelectedEvents()"
        on-items-update="updateEventsForCurrentGroup(items)"
        headers="tableConfig"
        sort-tag-context="events"
        orderable="true"
        add-new-button-text="新規イベント"
        on-add-new-clicked="showAddOrEditEventModal()"
        context-menu-options="eventMenuOptions(item)"
        no-data-message="まだイベントは作成されていません。作りましょう :)"
        none-found-message="イベントは見つかりません."
        search-placeholder="イベントを探す"
        test-button="true"
        on-test-button-clicked="fireEventManually(itemId)"
        status-field="active"
      >
        <fb-item-table-toolbar>
          <button ng-click="simulateEventsByType()" class="btn btn-default">
            <i class="fas fa-play-circle ml-2"></i> 模擬イベントを発生させる
          </button>
        </fb-item-table-toolbar>
      </firebot-item-table>
    </div>
  </div>
</div>
