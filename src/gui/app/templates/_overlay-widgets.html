<firebot-item-table
    items="overlayWidgetsService.overlayWidgetConfigs"
    on-items-update="onOverlayWidgetConfigsUpdated(items)"
    headers="headers"
    sort-tag-context="overlay widgets"
    orderable="true"
    add-new-button-text="新しいオーバーレイウィジェット"
    on-add-new-clicked="overlayWidgetsService.showAddOrEditOverlayWidgetModal()"
    context-menu-options="contextMenuOptions(item)"
    no-data-message="保存されたオーバーレイウィジェットがありません。作成してみましょう！"
    none-found-message="オーバーレイウィジェットが見つかりません。"
    search-placeholder="オーバーレイウィジェットを検索"
    test-button="false"
    status-field="active"
></firebot-item-table>
