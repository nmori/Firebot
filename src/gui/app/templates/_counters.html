<firebot-item-table
    items="countersService.counters"
    on-items-update="onCountersUpdated(items)"
    headers="headers"
    sort-tag-context="counters"
    orderable="true"
    add-new-button-text="新しいカウンター"
    on-add-new-clicked="countersService.showAddEditCounterModal()"
    context-menu-options="counterOptions(item)"
    no-data-message="保存されたカウンターがありません。作成してみましょう！"
    none-found-message="カウンターが見つかりません。"
    search-placeholder="カウンターを検索"
></firebot-item-table>
